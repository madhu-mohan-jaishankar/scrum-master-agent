[tool.uv.workspace]
members = [
    "packages/shared",
    "packages/processors",
    "packages/watsonx_client",
    "packages/context_store",
    "packages/dispatcher",
    "services/worker",
]

[tool.uv.sources]
scrumagent-shared = { workspace = true }
scrumagent-watsonx-client = { workspace = true }
scrumagent-context-store = { workspace = true }
scrumagent-processors = { workspace = true }
scrumagent-dispatcher = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
explicit_package_bases = true
mypy_path = [
    "packages/shared",
    "packages/watsonx_client",
    "packages/context_store",
    "packages/processors",
    "packages/dispatcher",
    "services/worker",
]
