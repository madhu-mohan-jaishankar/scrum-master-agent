[project]
name = "scrumagent-processors"
version = "0.1.0"
description = "Stateless event processor functions"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "scrumagent-shared",
    "scrumagent-watsonx-client",
    "scrumagent-context-store",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["scrumagent_processors"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
