[project]
name = "scrumagent-context-store"
version = "0.1.0"
description = "Sprint Context Store — in-memory mock for PoC"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "scrumagent-shared",
]

[tool.hatch.build.targets.wheel]
packages = ["scrumagent_context_store"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
