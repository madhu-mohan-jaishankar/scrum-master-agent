[project]
name = "scrumagent-shared"
version = "0.1.0"
description = "Canonical types and AgentEvent schema shared across all services"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["scrumagent_shared"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
